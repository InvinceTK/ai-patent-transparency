  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #222; }

    /* Left panel */
    .articles-panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      border-right: 1px solid #ddd;
      background: white;
    }

    .article-title {

      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-bottom: 10px;
      padding-bottom: 6px;

    .article-source-link {
      font-size: 10px;
      color: #4f6fff;
      text-decoration: none;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }
    .article-source-link:hover { text-decoration: underline; }

    .chunk {
      padding: 10px 14px;
      margin-bottom: 6px;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.6;
      background: #f7f8fa;
      transition: background 0.12s, border-color 0.12s;
    }
    .chunk:hover, .chunk.active {
      background: #eef2ff;
      border-color: #4f6fff;
    }
    .chunk-label {
      font-size: 10px;
      font-weight: 700;
      color: #bbb;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Right panel */
    .results-panel {
      width: 400px;
      flex-shrink: 0;
      overflow-y: auto;
      padding: 24px;
      background: #fafbfc;
    }

    .results-panel .panel-title { color: #555; font-size: 14px; }

    .placeholder {
      color: #bbb;
      font-size: 13px;
      text-align: center;
      margin-top: 60px;
      line-height: 1.7;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #aaa;
      margin: 18px 0 8px;
    }
    .section-label:first-child { margin-top: 0; }

    .result-card {
      background: white;
      border: 1px solid #e4e7ec;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .result-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .result-marker {
      font-size: 12px;
      font-weight: 700;
      color: #4f6fff;
    }
    .result-patent {
      font-size: 10px;
      color: #bbb;
    }
    .result-title {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-espacenet {
      font-size: 10px;
      color: #4f6fff;
      text-decoration: none;
      margin-bottom: 6px;
      display: inline-block;
    }
    .result-espacenet:hover { text-decoration: underline; }

    .sim-bar {
      height: 3px;
      background: #eee;
      border-radius: 2px;
      margin-bottom: 8px;
    }
    .sim-fill {
      height: 100%;
      background: #4f6fff;
      border-radius: 2px;
    }

    .result-content {
      font-size: 12px;
      line-height: 1.6;
      color: #555;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .sim-score {
      font-size: 10px;
      color: #bbb;
      margin-top: 6px;
    }

    .no-matches {
      font-size: 12px;
      color: #ccc;
      font-style: italic;
    }

    const DATA = {"telefonica_partnership_chunk_0": {"chunk_content": "idemia ’ s contactless biometric scanners have been selected by spain - based multinational telecom telefonica to provide secure access control for its business premises, and to bring the morphowave devices to the spanish market as part of its business portfolio. touchless biometric authentication with morphowave will be implemented at distrito telefonica ’ s demonstration and innovation center", "top_descriptions": [{"patent_id": "EP4660873", "marker": "[0016]", "content": "Smart cards can be used to digitally provide data to be read by a device. Examples of smart cards can include, but are not limited to, credit/debit cards, identification cards, transportation cards, calling cards, and access cards. The information provided on the card can be stored or accessed by an integrated circuit (IC) embedded in the card. The IC can include a microcontroller or similar processor and memory storage. The IC can be configured for data storage and retrieval, encryption, authentication, and other functions necessary for data transfer and authentication. The device interacting with the card can be a reader equipped to scan or read a smart card and initiate data transfer with the smart card. The scanning or reading can include scanning of a magnetic strip or contact with a chip embedded in the card body. Contactless readers are increasingly popular. Smart cards can include an antenna embedded within the card body to enable contactless data transfer between the integrated circuit of the chip and the reader. The contactless data transfer can be initiated by an inductive coupling, such as in near-field communication (NFC) protocols.", "similarity": 0.4234822988510132}, {"patent_id": "EP4660873", "marker": "[0049]", "content": "In one embodiment, the smart cards can be embossed after lamination. In some embodiments, a varnish can be added to both surfaces of the smart card after assembly. The varnish can prevent s ure often combined with additional overlaid text, holograms, or security protection patterns on the credential document. The additional overlays often obscure the ghost photo itself, rendering conventional authentication processes unreliable. For example, a given authentication process may cue on an overlay instead of the underlying ghost photo, resulting in an inability to identify the ghost photo and generating a false authentication, or a failure to authenticate a genuine document. Consequently, conventional facial recognition algorithms experience reduced performance, correctly detecting as few as 60% of faces in ghost photos. Likewise, conventional facial recognition matching algorithms and image template matching algorithms perform poorly when ghost photos are presented with additional overlays.", "similarity": 0.49554139375686646}, {"patent_id": "EP4383208", "marker": "[0020]", "content": "For example, authentication may include comparing a photograph or facial image of the user obtained from a biometric measurement device, such as a camera, to a photograph or facial image of the user contained in the system of record. Likewise, authentication may include comparing a fingerprint sample of the user obtained from a biometric measurement device, such as a camera and/or a fingerprint scanner, to a fingerprint sample contained in the system of record. Similarly, authentication of a document may include validating elements of document data against a system of record or, in combination with or independently, detecting whether a portrait photo on the document is authentic or fraudulent, e.g., modified or replaced.", "similarity": 0.4543016254901886}, {"patent_id": "EP4383208", "marker": "[0031]", "content": "Authentication processing system 200 computes edges 404 in two ways, i.e., a dual-mode edge detection. One computation is by locating local patches around portrait boundaries using conventional image processing algorithms, such as a Canny edge detection algorithm image of the user contained in the system of record. Likewise, authentication may include comparing a fingerprint sample of the user obtained from a biometric measurement device, such as a camera and/or a fingerprint scanner, to a fingerprint sample contained in the system of record. Similarly, authentication of a document may include validating elements of document data against a system of record or, in combination with or independently, detecting whether a portrait photo on the document is authentic or fraudulent, e.g., modified or replaced.", "similarity": 0.43828701972961426}, {"patent_id": "EP4383208", "marker": "[0010]", "content": "FIG. 1  is a diagram of an example document 100 having a portrait photo 102 in addition to an overlaid ghost photo 104 and at least one additional overlay 106. The additional overlay 106 may include text, one or more holograms, or one or more other security patterns. Document 100 is illustrated as an automobile driver's license issued, for example, by a state or other government agency for a state. In alternative embodiments, document 100 may include a passport, non-driver's license, or other credential document issued by a state government, the federal government, or other government agency.", "similarity": 0.3951713442802429}], "top_claims": [{"patent_id": "EP4383208", "marker": "13.", "content": "An authentication processing system, comprising: a memory storing a portrait fraud detection application; and\na processing unit coupled with the memory and configured to execute the portrait fraud detection application, the portrait fraud detection application, when executed, configuring the processing unit to :\nreceive a capture of a document including a portrait photo and at least one overlay;\ndetect a face within the portrait photo among the at least one overlay in the capture;\ndetermine the portrait photo is fraudulent; and\ninitiate an indication the document is fraudulent; , the processing unit being configured to implement th ore section of memory 206 may be omitted and the data stored remotely. For example, in certain embodiments, portrait fraud detection application 210 may be stored remotely on a server or mass-storage device and made available over a network 218 to CPU 202.", "similarity": 0.47904127836227417}, {"patent_id": "EP4383208", "marker": "[0020]", "content": "For example, authentication may include comparing a photograph or facial image of the user obtained from a biometric measurement device, such as a camera, to a photograph or facial image of the user contained in the system of record. Likewise, authentication may include comparing a fingerprint sample of the user obtained from a biometric measurement device, such as a camera and/or a fingerprint scanner, to a fingerprint sample contained in the system of record. Similarly, authentication of a document may include validating elements of document data against a system of record or, in combination with or independently, detecting whether a portrait photo on the document is authentic or fraudulent, e.g., modified or replaced.", "similarity": 0.46920910477638245}, {"patent_id": "EP4383208", "marker": "[0031]", "content": "Authentication processing system 200 computes edges 404 in two ways, i.e., a dual-mode edge detection. One computation is by locating local patches around portrait boundaries using conventional image processing algorithms, such as a Canny edge detection algorithm. The Canny edge detection algorithm utilizes multiple steps, including applying a Gaussian filter to smooth the input portrait photo, computing intensity gradients for the image, applying gradient magnitude thresholding, applying a double threshold to determine potential edges, and completing the edge by suppressing weak segments and connecting strong segments. Canny edge detection algorithms are generally well known. In certain embodiments, color boundaries are introduced to further identify local edge patches. In alternative embodiments, other edge detection algorithms may be employed.  FIG. 5  illustrates an example document 500 with a plurality of local patches 502 computed around a boundary of a portrait photo 504. Local patches 502 are defined by bounding boxes, each capturing a boundary segment 506 for evaluation.", "similarity": 0.46840840578079224}], "top_claims": [{"patent_id": "EP4383208", "marker": "13.", "content": "An authentication processing system, comprising: a memory storing a portrait fraud detection application; and\na processing unit coupled with the memory and configured to execute the portrait fraud detection application, the portrait fraud detection application, when executed, configuring the processing unit to :\nreceive a capture of a document including a portrait photo and at least one overlay;\ndetect a face within the portrait photo among the at least one overlay in the capture;\ndetermine the portrait photo is fraudulent; and\ninitiate an indication the document is fraudulent; , the processing unit being configured to implement the method according to any of the claims 1 to 7.", "similarity": 0.4333207309246063}, {"patent_id": "EP4383208", "marker": "15.", "content": "The authentication processing system according to any of the claim 13 to 14, wherein the at least one overlay comprises an overlay selected from the group consisting of: text,\na hologram, and\na security pattern.", "similarity": 0.4274876117706299}, {"patent_id": "EP4383208", "marker": "14.", "content": "The authentication processing system of claim 13, wherein the memory and the processing unit are components of a mobile device.", "similarity": 0.4044739007949829}]}, "oakland_airport_chunk_5": {"chunk_content": "passenger survey carried out by iata in 2021, 73 % of travelers are interested in the idea of using their biometrics to speed up airport processes while offering a touchless experience. in 2021, we worked on improving our facial recognition algorithms so that they are efficient even when passengers are wearing a facemask. p. a : the use of biometrics is gaining even more traction across the globe", "top_descriptions": [{"patent_id": "EP4383208", "marker": "[0009]", "content": "At least some credential documents include a \"ghost photo\" overlayed on the face of the credential document in a manner that is observable by an individual to whom the document is presented. Under ideal circumstances an authentication processing system evaluates a ghost photo, which is generally a duplicate of the portrait photo with resizing or other modifications, using conventional facial recognition algorithms. In practice, the ghost photo is a visible feature often combined with additional overlaid text, holograms, or security protection patterns on the credential document. The additional overlays often obscure the ghost photo itself, rendering conventional authentication processes unreliable. For example, a given authentication process may cue on an overlay instead of the underlying ghost photo, resulting in an inability to identify the ghost photo and generating a false authentication, or a failure to authenticate a genuine document. Consequently, conventional facial recognition algorithms experience reduced performance, correctly detecting as few as 60% of faces in ghost photos. Likewise, conventional facial recognition matching algorithms and image template matching algorithms perform poorly when ghost photos are presented with additional overlays.", "similarity": 0.4906851351261139}, {"patent_id": "EP4383208", "marker": "[0020]", "content": "For example, authentication may include comparing a photograph or facial image of the user obtained from a biometric measurement device, such as a camera, to a photograph or facial image of the user contained in the system of record. Likewise, authentication may include comparing a fingerprint sample of the user obtained from a biometric measurement device, such as a camera and/or a fingerprint scanner, to a fingerprint sample contained in the     const articlesEl = document.getElementById('articles');
    let activeChunk = null;

    for (const [articleName, chunks] of Object.entries(ARTICLES)) {
      const section = document.createElement('div');
      section.className = 'article-section';

      const title = document.createElement('div');
      title.className = 'article-title';
      const url = ARTICLE_URLS[articleName];
      title.innerHTML = escapeHtml(articleName.replace(/_/g, ' ')) +
        (url ? ' <a class="article-source-link" href="' + url + '" target="_blank" rel="noopener">↗ source</a>' : '');
      section.appendChild(title);

      for (const [idx, chunkName] of chunks) {
        const chunk = DATA[chunkName];
        const div = document.createElement('div');
        div.className = 'chunk';
        div.dataset.chunk = chunkName;
        div.innerHTML = '<div class="chunk-label">Chunk ' + idx + '</div>' + escapeHtml(chunk.chunk_content);
        div.addEventListener('mouseenter', () => showResults(chunkName, div));
        section.appendChild(div);
      }

      articlesEl.appendChild(section);
    }

    function showResults(chunkName, el) {
      if (activeChunk) activeChunk.classList.remove('active');
      el.classList.add('active');
      activeChunk = el;

      const chunk = DATA[chunkName];
      let html = '';

      html += '<div class="section-label">Top 3 Descriptions</div>';
      if (chunk.top_descriptions.length === 0) {
        html += '<p class="no-matches">No description matches</p>';
      } else {
        for (const d of chunk.top_descriptions) {
          html += resultCard(d.marker, d.patent_id, d.content, d.similarity);
        }
      }

      html += '<div class="section-label">Top 3 Claims</div>';
      if (chunk.top_claims.length === 0) {
        html += '<p class="no-matches">No claim matches</p>';
      } else {
        for (const c of chunk.top_claims) {
          html += resultCard(c.marker, c.patent_id, c.content, c.similarity);
        }
      }

      document.getElementById('results').innerHTML = html;
    }

    function resultCard(marker, patentId, content, similarity) {
      const pct = Math.round(similarity * 100);
      const title = PATENT_TITLES[patentId] || '';
      const espacenetUrl = 'https://worldwide.espacenet.com/patent/search?q=pn%3D' + encodeURIComponent(patentId);
      return (
        '<div class="result-card">' +
          '<div class="result-meta">' +
            '<span class="result-marker">' + escapeHtml(String(marker)) + '</span>' +
            '<span class="result-patent">' + escapeHtml(patentId) + '</span>' +
          '</div>' +
          (title ? '<div class="result-title">' + escapeHtml(title) + '</div>' : '') +
          '<a class="result-espacenet" href="' + espacenetUrl + '" target="_blank" rel="noopener">View on Espacenet ↗</a>' +
          '<div class="sim-bar"><div class="sim-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="result-content">' + escapeHtml(content) + '</div>' +
          '<div class="sim-score">Similarity: ' + similarity.toFixed(3) + '</div>' +
        '</div>'
      );
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
