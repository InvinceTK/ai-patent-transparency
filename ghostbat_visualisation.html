  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Left panel */

      color: #999;

    }
    .article-source-link {

      text-decoration: none;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }
    .article-source-link:hover { text-decoration: underline; }

    .chunk {
      padding: 10px 14px;
      margin-bottom: 6px;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.6;
      background: #f7f8fa;
      transition: background 0.12s, border-color 0.12s;
    }
    .chunk:hover, .chunk.active {
      background: #eef2ff;
      border-color: #4f6fff;
    }
    .chunk-label {
      font-size: 10px;
      font-weight: 700;
      color: #bbb;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Right panel */
    .results-panel {
      width: 400px;
      flex-shrink: 0;
      overflow-y: auto;
      padding: 24px;
      background: #fafbfc;
    }

    .results-panel .panel-title { color: #555; font-size: 14px; }

    .placeholder {
      color: #bbb;
      font-size: 13px;
      text-align: center;
      margin-top: 60px;
      line-height: 1.7;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #aaa;
      margin: 18px 0 8px;
    }
    .section-label:first-child { margin-top: 0; }

    .result-card {
      background: white;
      border: 1px solid #e4e7ec;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .result-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .result-marker {
      font-size: 12px;
      font-weight: 700;
      color: #4f6fff;
    }
    .result-patent {
      font-size: 10px;
      color: #bbb;
    }
    .result-title {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-espacenet {
      font-size: 10px;
      color: #4f6fff;
      text-decoration: none;
      margin-bottom: 6px;
      display: inline-block;
    }
    .result-espacenet:hover { text-decoration: underline; }

    .sim-bar {
      height: 3px;
      background: #eee;
      border-radius: 2px;
      margin-bottom: 8px;
    }
    .sim-fill {
      height: 100%;
      background: #4f6fff;
      border-radius: 2px;
    }

    .result-content {
      font-size: 12px;
      line-height: 1.6;
      color: #555;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .sim-score {
      font-size: 10px;
      color: #bbb;
      margin-top: 6px;
    }

    .no-matches {
      font-size: 12px;
      color: #ccc;
      font-style: italic;
    }
  </style>

    const DATA = {"aussie_buy_ghostbat_chunk_0": {"chunk_content": "he added that the development of the air - to - air capability for the mq - 28 took just over eight months, starting with a decision at the avalon airshow in march to the missile firing the mq - 28 was flown semi - autonomously for the engagement and colin miller, vice president and general manager of boeing phantom works, said during the briefing that the operator only issued four major commands", "top_descriptions": [{"patent_id": "EP3101502", "marker": "[0085]", "content": "With reference now toFigure 9, an illustration of a process for autonomously managing a mission objective for an unmanned aerial vehicle is depicted in the form of a flowchart in accordance with an illustrative embodiment. The process illustrated inFigure 9may be implemented using, for example, computer system224described inFigures 2-5. In particular, at least a portion of this process may be implemented using mission manager236described inFigures 2and5.", "similarity": 0.43717652559280396}, {"patent_id": "EP3223097", "marker": "[0025]", "content": "The mission control module 2 may be configured to monitor the progress of a mission or operation tasked to the unmanned aerial vehicle. The mission control module may include flight planning software, learning algorithms and so forth. The mission control module 2 may gather information while monitoring the progress of a mission or operation. The information gathered may indicate a conflict in the mission plan, which the mission control module 2 may be capable of solving using a negotiation algorithm. In addition, the mission control module 2 sends commands to the communication control component 6 which are addressed to the flight management system 40 to perform operations. These commands may provide parameters for performing an operation or may provide a portion of the parameters for performing an operation. In other examples, these commands may not provide parameters for performing an operation and may allow the flight management system 40 to select all or a portion of these parameters for performing the operation.", "similarity": 0.42942118644714355}, {"patent_id": "EP3223097", "marker": "[0015]", "content": "An illustrative embodiment of a system for controlling flight of an unmanned aerial vehicle is described in some detail below. However, not all features of an actual implementation are described in this specification. A person skilled in the art will appreciate that in the development of any such actual embodiment, numerous implementation-specific decisions must be made to achieve the developer's specific goals, such as compliance with system-related and business-related constraints, which will vary from one implementation to another. Moreover, it will be appreciated that such a development effort might be complex and time-consuming, but would nevertheless be a routine undertaking for those of ordinary skill in the art having the benefit of this disclosure.", "similarity": 0.4286104142665863}], "top_claims": [{"patent_id": "EP3223097", "marker": "11.", "content": "The system (10) as recited in claim 10, wherein the safety module (8) is further configured to send commands to the flight management system (40) for guiding the unmanned aerial vehicle (10) away from the object, and wherein the flight management system (40) receives commands from the safety module (8) and not from the mission control module (2) in response to a determination by the monitor module (4) that the trigger condition is present.", "similarity": 0.4201289415359497}, {"patent_id": "EP3101502", "marker": "14.", "content": "The apparatus of claim 13, wherein the computer system (224) is configured to autonomously process the sensor data (228) and identify the number of actions (225, 512) to be performed autonomously, the number of actions (212, 512) to be performed including storing information about the at least one target for future transmission to control station (210), while the unmanned aerial vehicle (202) is located in a restricted airspace outside the communications range (218) of the control station (210).", "similarity": 0.3999094069004059}, {"patent_id": "EP3101502", "marker": "10.", "content": "The method of claim 9, wherein identifying the number of actions (225) comprises: determining, by the computer system (224) autonomously, whether a contingency flight path (520) is needed based on the mission performance evaluation (514); and\ngenerating, by the computer system (224) autonomously, the contingency flight path (520), while the unmanned aerial vehicle (202) is outside communications range (218) of the control station (210).", "similarity": 0.3896377980709076}]}, "aussie_buy_ghostbat_chunk_1": {"chunk_content": "during the flight : having the drone take off, conduct a combat air patrol, commit to an intercept on the target and clearing it to arm and fire on the target. in a news release, boeing said that all three aircraft involved launched from separate locations for the test, with an operator on board the e - 7 took custodianship of the mq - 28 ensuring safety and engagement oversight,", "top_descriptions": [{"patent_id": "EP3223097", "marker": "[0007]", "content": "The embodiments disclosed in detail below employ verification and validation techniques to ensure the correct operation of an autonomous unmanned aerial vehicle, and to demonstrate that in a way that can be used for certification of the autonomous unmanned aerial vehicle. A monitor module is designed with the capability to monitor the execution of any autonomous system onboard the unmanned aerial vehicle and then trigger recovery mission actions if the system exits its safe operational bounds during performance of the originally planned mission.", "similarity": 0.5207635760307312}, {"patent_id": "EP3101502", "marker": "[0077]", "content": "The process may begin by autonomously performing a vehicle evaluation of an unmanned aerial vehicle during flight of the unmanned aerial vehicle while the unmanned aerial vehicle is outside communications range of a control station (operation700). Operation700may be performed by evaluating and processing at least one of data received from a number of vehicle systems onboard the unmanned aerial vehicle, sensor data received from a sensor system onboard the unmanned aerial vehicle, or other types of information.", "similarity": 0.5040101408958435}, {"patent_id": "EP2071353", "marker": "[0023]", "content": "With continued reference to Figure 1 , in certain embodiments the command module 54 may include data regarding the UAV mission environment. This data may include, for example, topographical terrain maps, locations of international borders, locations of obstructions and other data. The data may also include the locations and kinematics of other aircraft in the vicinity. By accessing the data in the command module 54, the present system 20 can command the UAV to maintain an uninterrupted track on a target while avoiding collisions/crashes and crossing into no fly zones. For example, the command module 54 may be configured to analyze an anticipated path of travel for the air vehicle and determine whether the path crosses into any restricted airspace or intersects any obstructions. The command module 54 may also validate UAV commands to ensure that the UAV is capable of executing the commands to achieve the desired flight path. For example, if a UAV command indicates that the UAV should execute a very tight turn that is beyond the UAVs physical limits, the validity function of the command module 54 will reject the command as being impossible for the UAV to execute.", "similarity": 0.49128401279449463}], "top_claims": [{"patent_id": "EP3223097", "marker": "14.", "content": "The method as recited in claim 13, further comprising: (d) determining that a command sent from the mission control module (2) to the flight management system (40) is invalid;\n(e) discontinuing the communicatio mination by the monitor module (4) that the trigger condition is present.", "similarity": 0.48126399517059326}]}, "aussie_buy_ghostbat_chunk_3": {"chunk_content": "he described it as “ fighter representative target ” engaged at an “ operationally representative range. ” he added that the mq - 28 provided mid - course guidance of the missile during the engagement using an unspecified onboard electronic warfare sensor that was “ effectively an aesa ( active electronically scanned array radar ) that has been specifically designed for a bunch of specialized functions. ” however, ferguson declined to elaborate on that", "top_descriptions": [{"patent_id": "EP2071353", "marker": "[0038]", "content": "In some embodiments, while the UAV searches, the system 20 compares the video signal 26 from the UAV with video from previous searches to locate possible targets. The system 20 may also process the video stream to locate new hot spots (using, for example, infrared scans), and identify pixel changes to detect scene changes. The system 20 may scan for infrared signatures, and may identify differences in the search area in the electro-optical (EO), infrared (IR) and electronic warfare (EW) bands to spot new targets in the area. The system 20 may process these inputs using the ATR/Trainer module 62 to identify known targets of opportunity. These functions may operate autonomously to detect and locate targets. Once a target is located, additional data may be collected. During the collection of additional data the UAV may follow one or more of the navigation plans outlined above (loiter 64, weave 66, chase 68) to collect sensor data while avoiding discovery of the UAV. Once desired data has been collected, the search pattern may resume.", "similarity": 0.5090072154998779}, {"patent_id": "WO2008020889", "marker": "[0017]", "content": "Image data from one or more sensor(s) 102 may be buffered temporarily in the frame buffer 114, which may simply be local Random Access Memory (RAM), Static or dynamic (SRAM or DRAM) in the FPGA processor, designated permanently or temporarily for frame buffer storage. Each sensor 102 may be provided with a dedicated frame buffer 114, or a shared frame buffer 114 may temporarily store image frames for all sensors. The image data is passed from the frame buffer 114 to a clutter suppression and target detection unit 118 in the preferred image interrogator 112. The clutter suppression and target detection unit 118 is capable of identifying targets under any conditions, e.g., against a natural sky, in clouds, and against terrain backgrounds, and under various lighting conditions. A LOS, multi-target tracking unit 120 tracks targets identified in the target detection unit 118 in LOS coordinates. The LOS, multi-target tracking unit 120 also maintains a history 122 of movement for each identified target. A threat assessment unit 124 monitors identified targets and the track history for each to determine the likelihood of a collision with each target. An avoidance maneuver unit 126 determines a suitable avoidance maneuver for any target deemed to be on a collision course with the host aircraft. The avoidance maneuver unit 126 passes the avoidance maneuvers to flight control and guidance 116 for execution.", "similarity": 0.4901103675365448}, {"patent_id": "WO2008020889", "marker": "[0022]", "content": "Optionally, the threat assessment unit 124 can make a probabilistic estimate in 1252 of whether a true range estimate is desired or deemed necessary. In those instances where a true range estimate is desired, the threat assessment unit 124 can determine target speed-to-size ratio from the reconstructed scaled three-dimensional trajectory, e.g., in 1250. Then in 1252, target speed-to-size ratio can be compared with the speed-to-size ratios and probabilities of known real collision threats with a match indicating that the target is a collision threat. Optionally, the motion of the host aircraft relative to the ground can be tracked, e.g., by the target detection unit 118, and factored into this probabilistic true range determination for better accuracy.", "similarity": 0.48012715578079224}], "top_claims": [{"patent_id": "WO2008020889", "marker": "11.", "content": "An aircraft as in claim 10, wherein said threat assessment unit determines whether each said tracked target poses a collision threat based on a respective target track history.", "similarity": 0.5122954845428467}, {"patent_id": "EP3101502", "marker": "15.", "content": "The apparatus of claim 14, wherein the computer system (224) further comprises: a communication network that transmits to the control station (210), one of the information stored about the at least one target or information of interest (230) that includes information related to tracking the at least one target, when the unmanned aerial enters within the communications range (218) of the control station (210), wherein the unmanned aerial vehicle (202) is extended beyond the range of control station (210) such that at least one target in a restricted airspace may be tracked.", "similarity": 0.5002591013908386}, {"patent_id": "WO2008020889", "marker": "28.", "content": "The method of claim 26, wherein said target trajectory is a three dimensional (3D) trajectory and determining said 3D trajectory comprises determining a line of sight (LOS) trajectory for said selected target to said airborne vehicle; and determining an apparent range change between said selected target and said airborne vehicle.", "similarity": 0.4890724718570709}]}, "fullspeed_ghostbat_chunk_1": {"chunk_content": "block 3, which represents the initial operational capability. block 3 introduces several changes, including a larger wing, an internal weapons bay, a beyond - line - of - sight datalink that permits untethered operations, and system security enhancements. the air vehicle will also be able to carry weapons externally for certain scenarios. the first operational vehicles are due for delivery to the raaf in 2028, at", "top_descriptions": [{"patent_id": "EP3248865", "marker": "[0006]", "content": "The features, functions, and advantages that have been discussed can be achieved independently in various embodiments of the present disclosure or may be combined in yet other embodiments, further details of which can be seen with reference to the following description and drawings. FIG. 1 is a block diagram of the operational elements and deployment scenario for embodiments as disclosed herein; FIG. 2A is a top view representation of an embodiment of the UAV with deployable transmit/receive module apparatus and ramjet with antennae in the retracted position for cruise; FIG. 2B is a representation of the embodiment of FIG. 2A with the antennae in the deployed position for skin return reception and air braking capability; FIG. 3 is a representation of details of the transmit/receive modules attachment to the antenna backplane and the antenna deployment mechanism; FIG. 4 is a block diagram of system components in the mothership aircraft and UAV; and, FIG. 5 is a flow chart of a method for implementing the disclosed embodiments. DETAILED DESCRIPTION", "similarity": 0.4451811611652374}, {"patent_id": "EP3101502", "marker": "[0072]", "content": "The illustrations of unmanned aerial vehicle202inFigures 2-5are not meant to imply physical or architectural limitations to the manner in which an illustrative embodiment may be implemented. Other components in addition to or in place of the ones illustrated may be used. Some components may be optional. Also, the blocks are presented to illustrate some functional components. One or more of these blocks may be combined, divided, or combined and divided into different blocks when implemented in an illustrative embodiment.", "similarity": 0.44111067056655884}, {"patent_id": "EP3101502", "marker": "[0048]", "content": "With reference now toFigure 5, an illustration of mission manager236of unmanned aerial vehicle202fromFigure 2is depicted in greater detail in the form of a block diagram in accordance with an illustrative embodiment. Mission manager236may include, for example, mission objective manager500and flight manager502.", "similarity": 0.42163965106010437}], "top_claims": [{"patent_id": "EP3248865", "marker": "8.", "content": "The unmanned aerial vehicle (UAV) (14) as defined in any of claims 1 to 7 wherein the self-destruct system (58) is operable by the UAV flight control system (44) or a UAV controller (42) installed in the mothership aircraft (10).", "similarity": 0.37157779932022095}, {"patent_id": "EP3101502", "marker": "15.", "content": "The apparatus of claim 14, wherein the computer system (224) further comprises: a communication network that transmits to the control station (210), one of the information stored about the at least one target or information of interest (230) that includes information related to tracking the at least one target, when the unmanned aerial enters within the communications range (218) of the control station (210), wherein the unmanned aerial vehicle (202) is extended beyond the range of control station (210) such that at least one target in a restricted airspace may be tracked.", "similarity": 0.36595597863197327}, {"patent_id": "EP3248865", "marker": "2.", "content": "The unmanned aerial vehicle (UAV) (14) defined in claim 1 wherein the antenna arms (22) deployed to the second extended position maintain an extension angle (33) not greater than a tilt angle (32) of an inlet intake (31) of the ramjet engine (30).", "similarity": 0.36011725664138794}]}, "fullspeed_ghostbat_chunk_4": {"chunk_content": "fired an aim - 120 amraam missile from an external pylon against an aerial target at an operationally relevant range. the target track was provided by an f / a - 18f super hornet, weapons firing authorization was handled by an e - 7, and the weapons firing solution and action were undertaken within the mq - 28 ’ s autonomous system. developing, installing, and proving all", "top_descriptions": [{"patent_id": "EP2071353", "marker": "[0041]", "content": "With reference to Figure 1 , the illustrated embodiment of the present system 20 may include a self-calibration planner module 106 configured to calibrate navigational sensors aboard the air vehicle. For example, at designated intervals the UAV may be commanded to enter a self-calibration mode. In this mode, the UAV loiters in a circle around a fixed surveyed location. In each quadrant of the loiter circle, the system 20 generates camera pointing commands at the fixed location. External sensors, such as GPS, are used to precisely locate the fixed target so that camera pointing errors can be measured. Differences between where the camera should be pointing and where it is actually pointing are then resolved so that target location errors are reduced and weapons probability of kill (PK) is increased. This calibration routine can be executed around a 360° sweep of the fixed location to characterize the repeatable errors in navigation and camera angle pointing. A characterization table may then be generated that can be used when calculating target location error (TLE) for a given target, as well as when compensating for camera pointing errors at known coordinates from other systems.", "similarity": 0.5842310190200806}, {"patent_id": "EP2071353", "marker": "[0031]", "content": "When the loiter path 70 encircles the target 72, the loiter plan advantageously provides full 360° imaging of the target 72. Images captured and other sensor readings taken from such 360° degree sweeps can advantageously provide full geometric data regarding the target 72 to the ATR module 22. In one embodiment the ATR/Trainer module 62 ( Figure 1 ) may be configured to catalog information about the target. For example, the ATR/Training module 62 may automatically log the target data and attempt to identify the target. If the target cannot be identified, then the ATR/Trainer module 62 classifies the target as a new entity and records the data. This data may be shared system wide, including continuous dissemination to other UAVs in the field. The present system 20 thus rapidly increases its knowledge base as UAVs in the field gather more and more data about new targets and share that data with other UAVs in the field.", "similarity": 0.5496869087219238}, {"patent_id": "EP3248865", "marker": "[0008]", "content": "Referring to the drawings, FIG. 1 shows a mothership aircraft 10 with a radar range limit 12. The radar system of the mothership aircraft 10 provides radar pulse power effective to a distance L while detection capability of the radar will be nominally L/2. The radar range limit 12 is defined as the detection range, L/2. To extend the effective radar range, a UAV 14 is launched from the mothership aircraft 10. After launch the UAV 14 is navigated, either autonomously with downloaded mission profile information or directly by aircrew in the mothership aircraft 10 or a remote land or sea based control station. Transmissions 16 from a C2 communication link, to be described in greater detail subsequently, are employed for communication between the mothership aircraft 10 and the UAV 14. While in transit between the mothership aircraft 10 and a target 20 (position 1) a ramjet 18 (to be described in greater detail with respect to FIG. 2A ) is engaged to provide sustained supersonic cruise for the UAV 14. The target 20 is beyond the radar range limit 12 from the mothership aircraft 10. As the UAV 14 travels on a flight profile beyond the radar range limit 12 and approaches the suspected target 20 (at position 2), antenna arms 22 are deployed (as shown in FIG. 2 ). Deployment of the antenna arms 22 provides an airbrake to reduce the velocity of the UAV and, as will be described in greater detail subsequently, positions transmit (Tx)/Receive (Rx) modules for optimum geometry with respect to the target 20. While the flight profile of the mothership aircraft 10 remains outside the radar range limit with respect to the target 20 as shown in FIG. 1 , radar illumination of the target 20 by the radar in the mothership aircraft, radar pulses represented by arrows 24, creates radar reflections from the target known in the art as \"skin returns\", as RF pulses represented by arrows 26. These skin returns are bistatically received by the Rx modules in the UAV 14. Sensor data from the Rx modules is transmitted over the communication link represented by trace 16', to the mothership aircraft 10 thereby extending the effective detection range of the radar on the mothership aircraft. The target 20 may be an air-to-air (A/A) target or and air-to-ground (A/G) target. Upon completion of the desired mission profile the UAV 14 egresses from the target area (position 3) and may be recovered or destroyed as will be described subsequently. In certain applications a drone-to-drone communication link, represented by arrow 28 may be employed for communications between a second launched UAV 14' and a first launched UAV 14 for navigation information to an identified target or other tactical information", "similarity": 0.5388996601104736}], "top_claims": [{"patent_id": "EP3101502", "marker": "14.", "content": "The apparatus of claim 13, wherein the computer system (224) is configured to autonomously process the sensor data (228) and identify the number of actions (225, 512) to be performed autonomously, the number of actions (212, 512) to be performed including storing information about the at least one target for future transmission to control station (210), while the unmanned aerial vehicle (202) is located in a restricted airspace outside the communications range (218) of the control station (210).", "similarity": 0.5345564484596252}, {"patent_id": "EP3223097", "marker": "11.", "content": "The system (10) as recited in claim 10, wherein the safety module (8) is further configured to send commands to the flight management system (40) for guiding the ip aircraft (10).", "similarity": 0.35672855377197266}, {"patent_id": "EP2071353", "marker": "9.", "content": "The system of Claim 1, wherein the air vehicle is an unmanned air vehicle (UAV) (74).", "similarity": 0.3488736152648926}, {"patent_id": "WO2008020889", "marker": "11.", "content": "An aircraft as in claim 10, wherein said threat assessment unit determines whether each said tracked target poses a collision threat based on a respective target track history.", "similarity": 0.341776043176651}]}, "fullspeed_ghostbat_chunk_6": {"chunk_content": "gain experience with its use. while there is a development roadmap for the mq - 28, or at least a series of capabilities and functions that can be enhanced or added, future development will be heavily informed by real - world use. with last year ’ s trials, that process is already underway and is being keenly watched by many prospective cca operators. as the system is essentially the", "top_descriptions": [{"patent_id": "EP2071353", "marker": "[0044]", "content": "With continued reference to Figure 1 , the illustrated embodiment of the present system 20 further includes a record/playback module 112. The record/playback module 112 may be configured to record data associated with a tracking operation, for example, as the UAV(s) tracks various targets. The recorded data may be played back later to assist in evaluating the overall performance of the system 20.", "similarity": 0.43137046694755554}, {"patent_id": "EP2071353", "marker": "[0011]", "content": "Because the present system is automated, it drastically reduces the workload of any operator(s) monitoring the system. The system thus enables tracking of high value moving targets while reducing the likelihood of a loss of positive identification (interruption in target viewing) during target tracking. The operator can \"fly the camera,\" because he or she is relieved of the dual duty of navigating the UAV and maintaining the desired pointing of the camera. The operator is thus able to focus on stalking targets, scanning borders, looking for IEDs, etc. The system also enables a single operator to track multiple moving targets simultaneously, increasing the probability of engaging a high value target after an external attack or a base intrusion incident. Because one operator working at a single location, such as an Insitu Multiple UAV Software Environment (IMUSE) station, may track multiple targets, the present system reduces the logistical footprint necessary for target tracking. The present system also allows an operator to control multiple UAVs to track maritime targets. It can establish a visual identification area around deep sea and littoral fleets to monitor, track and identify small or large moving objects.", "similarity": 0.40940797328948975}, {"patent_id": "WO2008020889", "marker": "[0017]", "content": "Image data from one or more sensor(s) 102 may be buffered temporarily in the frame buffer 114, which may simply be local Random Access Memory (RAM), Static or dynamic (SRAM or DRAM) in the FPGA processor, designated permanently or temporarily for frame buffer storage. Each sensor 102 may be provided with a dedicated frame buffer 114, or a shared frame buffer 114 may temporarily store image frames for all sensors. The image data is passed from the frame buffer 114 to a clutter suppression and target detection unit 118 in the preferred image interrogator 112. The clutter suppression and target detection unit 118 is capable of identifying targets under any conditions, e.g., against a natural sky, in clouds, and against terrain backgrounds, and under various lighting conditions. A LOS, multi-target tracking unit 120 tracks targets identified in the target detection unit 118 in LOS coordinates. The LOS, multi-target tracking unit 120 also maintains a history 122 of movement for each identified target. A threat assessment unit 124 monitors identified targets and the track history for each to determine the likelihood of a collision with each target. An avoidance maneuver unit 126 determines a suitable avoidance maneuver for any target deemed to be on a collision course with the host aircraft. The avoidance maneuver unit 126 passes the avoidance maneuvers to flight control and guidance 116 for execution.", "similarity": 0.38355210423469543}], "top_claims": [{"patent_id": "EP2071353", "marker": "6.", "content": "The system of Claim 1, further comprising at least one of a command module (54) configured to analyze an anticipated path of travel for the air vehicle and determine whether the path crosses into any restricted airspace or intersects any obstructions;\nan automatic target recognition trainer module (62) configured to catalog information about the target;\na self calibration planner module (106) configured to calibrate navigational sensors aboard the air vehicle;\na configuration manager module (108) configured to save a data configuration within the system so that the data configuration can be used in the future;\na legs module (46) configured to predict a flight path for the air vehicle; and\na record/playback module (112) configured to record data associated with a tracking operation.", "similarity": 0.4203405976295471}, {"patent_id": "EP3223097", "marker": "8.", "content": "The system (10) as recited in any of claims 1 to 7, further comprising: a plurality of flight status sensors (38); and\na sensor (56) connected to send data to the monitor module (4) regarding a position of an object,\nwherein the flight management system (40) comprises a vehicle state estimator that receives data from the flight status sensors (38) and communicates vehicle state estimates, including at least a vehicle position and speed, to the monitor module (4), the monitor module (4) is further configured to calculate a position of the object relative to the unmanned aerial vehicle (10), and to determine that a trigger condition is present when a position of an object relative to the unmanned aerial vehicle (10) violates a distance constraint.", "similarity": 0.3673775792121887}, {"patent_id": "EP3101502", "marker": "14.", "content": "The apparatus of claim 13, wherein the computer system (224) is configured to autonomously process the sensor data (228) and identify the number of actions (225, 512) to be performed autonomously, the number of actions (212, 512) to be performed including storing information about the at least one target for future transmission to control station (210), while the unmanned aerial vehicle (202) is located in a restricted airspace outside the communications range (218) of the control station (210).", "similarity": 0.36702975630760193}]}, "fullspeed_ghostbat_chunk_2": {"chunk_content": "which point it is forecast to become — by some considerable margin — the first service in the world to introduce this game - changing operational concept. boeing australia has been working on the cca concept for around eight years, giving it a head start that has resulted in what is today a mature system. the prototype first flew in february 2021, and a 2024 - 25 two - year contract saw the system", "top_descriptions": [{"patent_id": "EP3248865", "marker": "[0016]", "content": "The embodiments disclosed herein allow a method of target detection as shown in FIG. 5 . A UAV is mounted to a mothership aircraft, step 502, and mission information, potentially including an autonomous flight profile, may be downloaded from the mothership aircraft to the UAV, step 504. The UAV is launched and navigated into contested airspace using the ramjet engine for supersonic cruise, step 506, while the mothership aircraft maintains a flight profile outside a radar range limit in uncontested airspace, step 508. Upon target approach, antenna arms on the UAV are extended, step 509, to act as air brakes reducing speed and providing boresight orientation of Tx/Rx modules for bistatic RF pulse reception. The mothership aircraft employs a high power radar system to emit radar pulses, step 510, and the UAV employs the Rx/Tx modules as a bistatic receiver to receive reflected radar pulses from targets, step 512. The UAV then transmits target data via a communications data link to the mothership aircraft, step 514. The UAV may additionally receive flight control information from the mothership aircraft over the communications data link, step 516, and may report its location and current status, step 518. Upon completion of the mission profile, the UAV may retract the antenna arms and fly at supersonic cruise employing the ramjet engine to uncontested airspace and be recovered through a soft landing or other known recovery techniques, step 520. Alternatively, the UAV may self-destruct either autonomously through commands from the UAV control system or upon direction from the UAV controller on the mothership aircraft, step 522. While described herein as launched from the mothership aircraft, the UAV may be conventionally launched from other ground or airborne assets for the desired flight profile into contested airspace achieving data link communication with the mothership aircraft when both have established their respective flight profiles.", "similarity": 0.3479629456996918}, {"patent_id": "EP3248865", "marker": "[0006]", "content": "The features, functions, and advantages that have been discussed can be achieved independently in various embodiments of the present disclosure or may be combined in yet other embodiments, further details of which can be seen with reference to the following description and drawings. FIG. 1 is a block diagram of the operational elements and deployment scenario for embodiments as disclosed herein; FIG. 2A is a top view representation of an embodiment of the UAV with deployable transmit/receive module apparatus and ramjet with antennae in the retracted position for cruise; FIG. 2B is a representation of the embodiment of FIG. 2A with the antennae in the deployed position for skin return reception and air braking capability; FIG. 3 is a representation of details of the transmit/receive modules attachment to the antenna backplane and the antenna deployment mechanism; FIG. 4 is a block diagram of system components in the mothership aircraft and UAV; and, FIG. 5 is a flow chart of a method for implementing the disclosed embodiments. DETAILED DESCRIPTION", "similarity": 0.33374863862991333}, {"patent_id": "EP3101502", "marker": "[0077]", "content": "The process may begin by autonomously performing a vehicle evaluation of an unmanned aerial vehicle during flight of the unmanned aerial vehicle while the unmanned aerial vehicle is outside communications range of a control station (operation700). Operation700may be performed by evaluating and processing at least one of data received from a number of vehicle systems onboard the unmanned aerial vehicle, sensor data received from a sensor system onboard the unmanned aerial vehicle, or other types of information.", "similarity": 0.33156338334083557}], "top_claims": [{"patent_id": "EP3101502", "marker": "10.", "content": "The method of claim 9, wherein identifying the number of actions (225) comprises: determining, by the computer system (224) autonomously, whether a contingency flight path (520) is needed based on the mission performance evaluation (514); and\ngenerating, by the computer system (224) autonomously, the contingency flight path (520), while the unmanned aerial vehicle (202) is outside communications range (218) of the control station (210).", "similarity": 0.32761451601982117}, {"patent_id": "WO2008020889", "marker": "13.", "content": "An aircraft as in claim 10, wherein said image interrogator is implemented in at least one Field Programmable Gate Array processor.", "similarity": 0.30718544125556946}, {"patent_id": "EP3223097", "marker": "12.", "content": "The system (10) as recited in claim 1, further comprising a communication control component (6) which is switchable between a mission state in which the flight management system (40) is controlled by the mission control module (2) and a safety state in which the flight management system (40) is controlled by the safety module (8), the state of the communication control component (6) being controlled by an output from the monitor module (4).", "similarity": 0.30534422397613525}]}, "aussie_buy_ghostbat_chunk_4": {"chunk_content": "system any further. the engagement saw the e - 7 operating somewhere between 100 to 200 miles behind the mq - 28, and although the super hornet flew alongside the cca during the event, it could operate at much further distances away during real world operations, said ferguson. colin clark in sydney contributed to this report.", "top_descriptions": [{"patent_id": "EP3101502", "marker": "[0004]", "content": "However, operation of the unmanned aerial vehicle may be constrained by the maximum range for communications between the unmanned aerial vehicle and the control station. As one example, some communications systems onboard an unmanned aerial vehicle may require that the unmanned aerial vehicle be within about 50 miles of the control station. Further, some communications systems onboard an unmanned aerial vehicle may require a direct line of sight between the unmanned aerial vehicle and the control station.", "similarity": 0.42329302430152893}, {"patent_id": "EP3101502", "marker": "[0021]", "content": "Any number of points along flight path213may be outside a maximum communications range of control station210.As one illustrative example, second location216of area of interest206may be outside communications range218of control station210.Communications range218of control station210may be the maximum distance from control station210at which a vehicle, such as unmanned aerial vehicle202,may communicate with control station210to exchange data with control station210.In some illustrative examples, communications range218may be substantially the same at all angles relative to control station210.However, in other illustrative examples, communications range218may vary at different angles relative to control station210.In some cases, being outside communications range218may also be referred to as being beyond line of sight220.", "similarity": 0.4088378846645355}, {"patent_id": "EP3101502", "marker": "[0016]", "content": "Second location110of unmanned aerial vehicle102may be outside communications range112of first location108of control station106.In particular, unmanned aerial vehicle102may be outside communications range112of communications system114at control station106.However, unmanned aerial vehicle102may be configured to autonomously perform processing of data and decision-making based on this processing when outside communications range112.", "similarity": 0.38318172097206116}], "top_claims": [{"patent_id": "EP3101502", "marker": "12.", "content": "The method of claim 7 further comprising: transmitting, by the computer system (224) autonomously, at least one of the information stored about the at least one target or information of interest (230) including information related to tracking the at least one target to the control station (210), when the unmanned aerial enters within the communications range (218) of the control station (210), wherein the unmanned aerial vehicle (202) is extended beyond the range of control station (210) such that at least one target in a restricted airspace may be tracked.", "similarity": 0.3497154116630554}, {"patent_id": "EP3101502", "marker": "15.", "content": "The apparatus of claim 14, wherein the computer system (224) further comprises: a communication network that transmits to the control station (210), one of the information stored about the at least one target or information of interest (230) that includes information related to tracking the at least one target, when the unmanned aerial enters within the communications range (218) of the control station (210), wherein the unmanned aerial vehicle (202) is extended beyond the range of control station (210) such that at least one target in a restricted airspace may be tracked.", "similarity": 0.34844544529914856}, {"patent_id": "WO2008020889", "marker": "30.", "content": "The method of claim 25, wherein commanding the vehicle to avoid collision comprises: retrieving trajectories for all detected said targets; determining a minimum safe distance for said airborne vehicle from each target identified as collision threat; and determining a maneuver for said airborne vehicle to avoid all detected said targets.", "similarity": 0.3418954014778137}]}, "ghostbat_gains_weapons_chunk_5": {"chunk_content": "of the aircraft to integrate their own capabilities on the platform. “ they can adopt their own sensors if they wish, and they can apply their own weapons without needing to have to involve us at the levels you might expect on a normal crewed platform. ” that sovereign capability and development is all about partnerships and relationships, and we are looking to share that with other countries as they look to embrace a cc", "top_descriptions": [{"patent_id": "EP3248865", "marker": "[0017]", "content": "Further, the disclosure comprises embodiments according to the following clauses: Clause 1. A system for bistatic radar target detection comprising: a mothership aircraft having a radar transmitter for transmitting radar pulses, said mothership aircraft operating with an aircraft flight profile outside a radar range limit with respect to a target; an unmanned aerial vehicle (UAV) having a ramjet providing supersonic cruise of the UAV, and deployable antenna arms supporting a passive radar antenna having a plurality of receive (Rx) modules for bistatic reception of reflected radar pulses, said UAV operating with a UAV flight profile in airspace beyond the radar range limit relative to the target, said deployable antenna arms having a first retracted position for supersonic cruise and adapted for deployment to a second extended position, said second extended position acting as an airbrake and providing boresight alignment of the Rx modules; and, a communications data link operably interconnecting the UAV and the tactical mothership aircraft, said communications data link transmitting data produced by the bistatic reception of reflected radar pulses in the UAV radar antenna to the mothership aircraft. Clause 2. The system for bistatic radar target detection as defined in Clause 1 further comprising a UAV controller in the mothership aircraft, said UAV controller operably connected to the communications data link and transmitting flight control information to a UAV flight control system to control the UAV flight profile. Clause 3. The system for bistatic radar target detection as defined in Clause 1 wherein the antenna arms deployed to the second position maintain an extension angle not greater than the tilt angle of an inlet intake of the ramjet engine. Clause 4. The system for bistatic radar target detection as defined in Clause 1 wherein the passive radar receiver comprises a plurality of receive (Rx) modules attached to the antenna arms at an angle complimentary to the extension angle. Clause 5. The system for bistatic radar target detection as defined in Clause 3 wherein the antenna arms in the first retracted position are substantially flush with a side profile of the UAV. Clause 6. The system for bistatic radar target detection as defined in Clause 4 further comprising deployment rods pivotally connected to the antenna arms to deploy the antenna arms Clause 7. The system for bistatic radar target detection as defined in Clause 6 wherein the deployment rods are carried in a pressure cylinder and activated by pneumatic pressure from a bypass duct connected to the inlet intake. Clause 8. The system for bistatic radar target detection as defined in Clause 2 further comprising a self-destruct system in the UAV. Clause 9. The system for bistatic radar target detection as defined in Clause 6 wherein the self-destruct system is operable by the UAV flight control system or the UAV controller. Clause 10. A method for bistatic radar target detection comprising: launching a UAV and navigating the UAV with a ramjet engine at supersonic cruise to beyond a radar range limit; maintaining a mothership aircraft on a flight profile outside the radar range limit; extending antenna arms to act as air brakes reducing speed and providing boresight orientation of Tx/Rx modules for bistatic RF pulse reception; employing a high power radar system on the mothership aircraft to emit radar pulses; employing receive (Rx) modules on the UAV as a bistatic receiver to receive reflected radar pulses from targets; and, transmitting target data from the UAV via a communications data link to the mothership aircraft. Clause 11. The method as defined in Clause 10 further comprising: mounting the UAV to the mothership aircraft; and, the step of launching the UAV comprises launching the UAV from the mothership aircraft. Clause 12. The method as defined in Clause 11 further comprising: downloading mission information from the mothership aircraft to the UAV. Clause 13. The method as defined in Clause 12 wherein the mission information includes a flight profile for the UAV. Clause 14. The method as defined in Clause 11 further comprising: receiving flight control information to the UAV from the mothership aircraft over the communications data link. Clause 15. The method as defined in Clause 11 further comprising: reporting location and current status by the UAV over the communications data link. Clause 16. The method as defined in Clause 10 further comprising: Retracting the antenna arms and flying the UAV at supersonic cruise to uncontested airspace upon completion of the mission profile; and, recovering the UAV through soft landing or other known recovery techniques. Clause 17. The method as defined in Clause 10 further comprising: causing the UAV to self-destruct after completion of a mission profile. Clause 18. The method as defined in Clause 17 wherein the step of causing the UAV to self-destruct is autonomous through commands from the UAV control system. Clause 19. The method as defined in Clause 17 wherein the step of causing the UAV to self-destruct occurs upon direction from the UAV controller on the mothership aircraft. Clause 20. An unmanned aerial vehicle (UAV) comprising: a ramjet providing supersonic cruise of the UAV, and deployable antenna arms supporting a passive radar antenna having a plurality of receiver (Rx) modules for bistatic reception of reflected radar pulses from a radar transmitter on a mothership aircraft, said mothership aircraft operating with a flight profile outside a radar range limit and said UAV operating with a UAV flight profile in airspace beyond the radar range limit, said deployable antenna arms having a first retracted position for supersonic cruise and adapted for deployment to a second extended position, said second extended position acting as an airbrake and providing boresight alignment of the Rx modules; and, a communications data link operably interconnecting the UAV and the mothership aircraft, said communications data link transmitting data produced by the bistatic reception of reflected radar pulses in the UAV radar antenna to the mothership aircraft.", "similarity": 0.45468655228614807}, {"patent_id": "EP3248865", "marker": "[0011]", "content": "The system components incorporated in the UAV 14 and mothership aircraft 10 are shown in FIG. 4 . The mothership aircraft 10 incorporates a high power transmit and receive radar system 40 and a UAV controller 42. A mission management system/pilot vehicle interface system 43, integral to the mothership aircraft and adapted for interface to a crewmember on the mothership aircraft, provides interface control for the radar system 40 and the UAV controller 42. The UAV controller may be operated by a crewmember on the mothership aircraft 10 for direct control of the UAV flight profile and UAV radar system. The UAV 14 incorporates a UAV control system 44 which controls the flight profile of the UAV. UAV radar system 46 incorporates the deployable radar antenna arms 22 with the Tx/Rx modules 34 as described in FIG. 3 as well as a data processing system for receiving and processing bistatic radar signals. Typically the Tx/Rx modules will operate in receive mode only as Rx modules for acquisition of bistatic signals generated from the mothership aircraft radar. However, in certain applications, the UAV radar system 46 will include transmitting capability to supplement the radar transmission from the mothership aircraft 10. A communications data link 48 in the mothership aircraft 10 and a mating communications data link 50 in the UAV 14 are operably connected to provide communications between the mothership aircraft and the UAV. Data from the communications data link 48 to the mission management and pilot vehicle interface system 43 represented by arrow 45 provides bistatic radar information from the UAV radar system 46 and data regarding the UAV position and flight profile from the UAV control system 44 to the mission management and pilot vehicle interface system 43 for display. Radar commands 47 from the mission management and pilot vehicle interface system 43 to the aircraft radar system 40 provide commands to the radar to directionally control the radar beam to the intended target. UAV commands 49 from the mission management and pilot vehicle interface system 43 to the UAV controller 42 provide input through the communications data link 48 to command the UAV to fly/orbit/loiter in a desired flight profile. In the exemplary embodiment, an L-band (1 to 2 GHz) data link for line of sight bidirectional communication is employed. The UAV may remain primarily in a receive only mode. The data link will contain messages which will be used to direct and control the UAV's flight control system 44 as well as the radar system 46, as needed. The UAV will use the data link to report its location and current air vehicle status back to the host mothership aircraft as well as transmission of data from the radar system 46. The communications data links 48, 50 may employ data burst or beam agility capability for covert operation. The communications data links 48, 50 may also employ pre-launch communications elements 52, 54 \"hardwire\" connected through Ethernet or fiber optic ports 56 for pre-launch communication between the mothership aircraft 10 and UAV 14.", "similarity": 0.4427613615989685}, {"patent_id": "EP3248865", "marker": "[0016]", "content": "The embodiments disclosed herein allow a method of target detection as shown in FIG. 5 . A UAV is mounted to a mothership aircraft, step 502, and mission information, potentially including an autonomous flight profile, may be downloaded from the mothership aircraft to the UAV, step 504. The UAV is launched and navigated into contested airspace using the ramjet engine for supersonic cruise, step 506, while the mothership aircraft maintains a flight profile outside a radar range limit in uncontested airspace, step 508. Upon target approach, antenna arms on the UAV are extended, step 509, to act as air brakes reducing speed and providing boresight orientation of Tx/Rx modules for bistatic RF pulse reception. The mothership aircraft employs a high power radar system to emit radar pulses, step 510, and the UAV employs the Rx/Tx modules as a bistatic receiver to receive reflected radar pulses from targets, step 512. The UAV then transmits target data via a communications data link to the mothership aircraft, step 514. The UAV may additionally receive flight control information from the mothership aircraft over the communications data link, step 516, and may report its location and current status, step 518. Upon completion of the mission profile, the UAV may retract the antenna arms and fly at supersonic cruise employing the ramjet engine to uncontested airspace and be recovered through a soft landing or other known recovery techniques, step 520. Alternatively, the UAV may self-destruct either autonomously through commands from the UAV control system or upon direction from the UAV controller on the mothership aircraft, step 522. While described herein as launched from the mothership aircraft, the UAV may be conventionally launched from other ground or airborne assets for the desired flight profile into contested airspace achieving data link communication with the mothership aircraft when both have established their respective flight profiles.", "similarity": 0.423267126083374}], "top_claims": [{"patent_id": "EP3248865", "marker": "8.", "content": "The unmanned aerial vehicle (UAV) (14) as defined in any of claims 1 to 7 wherein the self-destruct system (58) is operable by the UAV flight control system (44) or a UAV controller (42) installed in the mothership aircraft (10).", "similarity": 0.4190586507320404}, {"patent_id": "EP3248865", "marker": "10.", "content": "The method as defined in claim 9 further comprising: mounting the UAV (14) to the mothership aircraft (10); and,\nthe step of launching the UAV (14) comprises launching the UAV (14) from the mothership aircraft (10).", "similarity": 0.3798598349094391}, {"patent_id": "EP3248865", "marker": "11.", "content": "The method as defined in any of claims 9 to 10 further comprising: downloading mission information from the mothership aircraft (10) to the UAV (14).", "similarity": 0.3722231686115265}]}, "ghostbat_gains_weapons_chunk_0": {"chunk_content": "singapore — boeing ’ s mq - 28 ghost bat collaborative combat aircraft ( cca ) will gain internal weapons bays along with an increased wingspan, the global program director announced during this week ’ s singapore airshow. speaking at a media briefing here on wednesday, glen ferguson told reporters that block 3 aircraft will be able to carry weapons such as the aim - 120 medium range air - to - air missile", "top_descriptions": [{"patent_id": "EP3248865", "marker": ses: Clause 1. A system for bistatic radar target detection comprising: a mothership aircraft having a radar transmitter for transmitting radar pulses, said mothership aircraft operating with an aircraft flight profile outside a radar range limit with respect to a target; an unmanned aerial vehicle (UAV) having a ramjet providing supersonic cruise of the UAV, and deployable antenna arms supporting a passive radar antenna having a plurality of receive (Rx) modules for bistatic reception of reflected radar pulses, said UAV operating with a UAV flight profile in airspace beyond the radar range limit relative to the target, said deployable antenna arms having a first retracted position for supersonic cruise and adapted for deployment to a second extended position, said second extended position acting as an airbrake and providing boresight alignment of the Rx modules; and, a communications data link operably interconnecting the UAV and the tactical mothership aircraft, said communications data link transmitting data produced by the bistatic reception of reflected radar pulses in the UAV radar antenna to the mothership aircraft. Clause 2. The system for bistatic radar target detection as defined in Clause 1 further comprising a UAV controller in the mothership aircraft, said UAV controller operably connected to the communications data link and transmitting flight control information to a UAV flight control system to control the UAV flight profile. Clause 3. The system for bistatic radar target detection as defined in Clause 1 wherein the antenna arms deployed to the second position maintain an extension angle not greater than the tilt angle of an inlet intake of the ramjet engine. Clause 4. The system for bistatic radar target detection as defined in Clause 1 wherein the passive radar receiver comprises a plurality of receive (Rx) modules attached to the antenna arms at an angle complimentary to the extension angle. Clause 5. The system for bistatic radar target detection as defined in Clause 3 wherein the antenna arms in the first retracted position are substantially flush with a side profile of the UAV. Clause 6. The system for bistatic radar target detection as defined in Clause 4 further comprising deployment rods pivotally connected to the antenna arms to deploy the antenna arms Clause 7. The system for bistatic radar target detection as defined in Clause 6 wherein the deployment rods are carried in a pressure cylinder and activated by pneumatic pressure from a bypass duct connected to the inlet intake. Clause 8. The system for bistatic radar target detection as defined in Clause 2 further comprising a self-destruct system in the UAV. Clause 9. The system for bistatic radar target detection as defined in Clause 6 wherein the self-destruct system is operable by the UAV flight control system or the UAV controller. Clause 10. A method for bistatic radar target detection comprising: launching a UAV and navigating the UAV with a ramjet engine at supersonic cruise to beyond a radar range limit; maintaining a mothership aircraft on a flight profile outside the radar range limit; extending antenna arms to act as air brakes reducing speed and providing boresight orientation of Tx/Rx modules for bistatic RF pulse reception; employing a high power radar system on the mothership aircraft to emit radar pulses; employing receive (Rx) modules on the UAV as a bistatic receiver to receive reflected radar pulses from targets; and, transmitting target data from the UAV via a communications data link to the mothership aircraft. Clause 11. The method as defined in Clause 10 further comprising: mounting the UAV to the mothership aircraft; and, the step of launching the UAV comprises launching the UAV from the mothership aircraft. Clause 12. The method as defined in Clause 11 further comprising: downloading mission information from the mothership aircraft to the UAV. Clause 13. The method as defined in Clause 12 wherein the mission information includes a flight profile for the UAV. Clause 14. The method as defined in Clause 11 further comprising: receiving flight control information to the UAV from the mothership aircraft over the communications data link. Clause 15. The method as defined in Clause 11 further comprising: reporting location and current status by the UAV over the communications data link. Clause 16. The method as defined in Clause 10 further comprising: Retracting the antenna arms and flying the UAV at supersonic cruise to uncontested airspace upon completion of the mission profile; and, recovering the UAV through soft landing or other known recovery techniques. Clause 17. The method as defined in Clause 10 further comprising: causing the UAV to self-destruct after completion of a mission profile. Clause 18. The method as defined in Clause 17 wherein the step of causing the UAV to self-destruct is autonomous through commands from the UAV control system. Clause 19. The method as defined in Clause 17 wherein the step of causing the UAV to self-destruct occurs upon direction from the UAV controller on the mothership aircraft. Clause 20. An unmanned aerial vehicle (UAV) comprising: a ramjet providing supersonic cruise of the UAV, and deployable antenna arms supporting a passive radar antenna having a plurality of receiver (Rx) modules for bistatic reception of reflected radar pulses from a radar transmitter on a mothership aircraft, said mothership aircraft operating with a flight profile outside a radar range limit and said UAV operating with a UAV flight profile in airspace beyond the radar range limit, said deployable antenna arms having a first retracted position for supersonic cruise and adapted for deployment to a second extended position, said second extended position acting as an airbrake and providing boresight alignment of the Rx modules; and, a communications data link operably interconnecting the UAV and the mothership aircraft, said communications data link transmitting data produced by the bistatic reception of reflected radar pulses in the UAV radar antenna to the mothership aircraft.", "similarity": 0.34059396386146545}], "top_claims": [{"patent_id": "EP3248865", "marker": "8.", "content": "The unmanned aerial vehicle (UAV) (14) as defined in any of claims 1 to 7 wherein the self-destruct system (58) is operable by the UAV flight control system (44) or a UAV controller (42) installed in the mothership aircraft (10).", "similarity": 0.30929484963417053}]}, "ghostbat_gains_weapons_chunk_1": {"chunk_content": "and the small diameter bomb. ferguson was keen to stress, however, that the only constraint on the types of payloads that could be carried in the bays was physical, with the ghost bat ’ s modularity and open architecture meaning that a variety of weapons could be integrated on it as long as it fit the bays. this modularity and open architecture also mean that the cca is able to carry", "top_descriptions": [{"patent_id": "EP3248865", "marker": "[0014]", "content": "As described with respect to FIG. 1 , the UAV 14 may be retrieved via a low impact landing after a flight profile to a friendly area for recovery or the UAV will carry a destruct system 58 with explosives for self-destruction purposes on vital communication and radar subsystems in the UAV. The destruct system 58 may be activated, either as a portion of the flight profile or upon loss of data link communications, through the UAV control system 44, or upon instruction from mission management and pilot vehicle interface system 43 through the UAV controller 42 on the mothership aircraft 10 transmitted using communications data links 48, 50.", "similarity": 0.39951613545417786}, {"patent_id": "EP3248865", "marker": "[0017]", "content": "Further, the disclosure comprises embodiments according to the following clauses: Clause 1. A system for bistatic radar target detection comprising: a mothership aircraft having a radar transmitter for transmitting radar pulses, said mothership aircraft operating with an aircraft flight profile outside a radar range limit with respect to a target; an unmanned aerial vehicle (UAV) having a ramjet providing supersonic cruise of the UAV, and deployable antenna arms supporting a passive radar antenna having a plurality of receive (Rx) modules for bistatic reception of reflected radar pulses, said UAV operating with a UAV flight profile in airspace beyond the radar range limit relative to the target, said deployable antenna arms having a first retracted position for supersonic cruise and adapted for deployment to a second extended position, said second extended position acting as an airbrake and providing boresight alignment of the Rx modules; and, a communications data link operably interconnecting the UAV and the tactical mothership aircraft, said communications data link transmitting data produced by the bistatic reception of reflected radar pulses in the UAV radar antenna to the mothership aircraft. Clause 2. The system for bistatic radar target detection as defined in Clause 1 further comprising a UAV controller in the mothership aircraft, said UAV controller operably connected to the communications data link and transmitting flight control information to a UAV flight control system to control the UAV flight profile. Clause 3. The system for bistatic radar target detection as defined in Clause 1 wherein the antenna arms deployed to the second position maintain an extension angle not greater than the tilt angle of an inlet intake of the ramjet engine. Clause 4. The system for bistatic radar target detection as defined in Clause 1 wherein the passive radar receiver comprises a plurality of receive (Rx) modules attached to the antenna arms at an angle complimentary to the extension angle. Clause 5. The system for bistatic radar target detection as defined in Clause 3 wherein the antenna arms in the first retracted position are substantially flush with a side profile of the UAV. Clause 6. The system for bistatic radar target detection as defined in Clause 4 further comprising deployment rods pivotally connected to the antenna arms to deploy the antenna arms Clause 7. The system for bistatic radar target detection as defined in Clause 6 wherein the deployment rods are carried in a pressure cylinder and activated by pneumatic pressure from a bypass duct connected to the inlet intake. Clause 8. The system for bistatic radar target detection as defined in Clause 2 further comprising a self-destruct system in the UAV. Clause 9. The system for bistatic radar target detection as defined in Clause 6 wherein the self-destruct system is operable by the UAV flight control system or the UAV controller. Clause 10. A method for bistatic radar target detection comprising: launching a UAV and navigating the UAV with a ramjet engine at supersonic cruise to beyond a radar range limit; maintaining a mothership aircraft on a flight profile outside the radar range limit; extending antenna arms to act as air brakes reducing speed and providing boresight orientation of Tx/Rx modules for bistatic RF pulse reception; employing a high power radar system on the mothership aircraft to emit radar pulses; employing receive (Rx) modules on the UAV as a bistatic receiver to receive reflected radar pulses from targets; and, transmitting target data from the UAV via a communications data link to the mothership aircraft. Clause 11. The method as defined in Clause 10 further comprising: mounting the UAV to the mothership aircraft; and, the step of launching the UAV comprises launching the UAV from the mothership aircraft. Clause 12. The method as defined in Clause 11 further comprising: downloading mission information from the mothership aircraft to the UAV. Clause 13. The method as defined in Clause 12 wherein the mission information includes a flight profile for the UAV. Clause 14. The method as defined in Clause 11 further comprising: receiving flight control information to the UAV from the mothership aircraft over the communications data link. Clause 15. The method as defined in Clause 11 further comprising: reporting location and current status by the UAV over the communications data link. Clause 16. The method as defined in Clause 10 further comprising: Retracting the antenna arms and flying the UAV at supersonic cruise to uncontested airspace upon completion of the mission profile; and, recovering the UAV through soft landing or other known recovery techniques. Clause 17. The method as defined in Clause 10 further comprising: causing the UAV to self-destruct after completion of a mission profile. Clause 18. The method as defined in Clause 17 wherein the step of causing the UAV to self-destruct is autonomous through commands from the UAV control system. Clause 19. The method as defined in Clause 17 wherein the step of causing the UAV to self-destruct occurs upon direction from the UAV controller on the mothership aircraft. Clause 20. An unmanned aerial vehicle (UAV) comprising: a ramjet providing supersonic cruise of the UAV, and deployable antenna arms supporting a passive radar antenna having a plurality of receiver (Rx) modules for bistatic reception of reflected radar pulses from a radar transmitter on a mothership aircraft, said mothership aircraft operating with a flight profile outside a radar range limit and said UAV operating with a UAV flight profile in airspace beyond the radar range limit, said deployable antenna arms having a first retracted position for supersonic cruise and adapted for deployment to a second extended position, said second extended position acting as an airbrake and providing boresight alignment of the Rx modules; and, a communications data link operably interconnecting the UAV and the mothership aircraft, said communications data link transmitting data produced by the bistatic reception of reflected radar pulses in the UAV radar antenna to the mothership aircraft.", "similarity": 0.35901159048080444}, {"patent_id": "EP3248865", "marker": "[0011]", "content": "The system components incorporated in the UAV 14 and mothership aircraft 10 are shown in FIG. 4 . The mothership aircraft 10 incorporates a high power transmit and receive radar system 40 and a UAV controller 42. A mission management system/pilot vehicle interface system 43, integral to the mothership aircraft and adapted for interface to a crewmember on the mothership aircraft, provides interface control for the radar system 40 and the UAV controller 42. The UAV controller may be operated by a crewmember on the mothership aircraft 10 for direct control of the UAV flight profile and UAV radar system. The UAV 14 incorporates a UAV control system 44 which controls the flight profile of the UAV. UAV radar system 46 incorporates the deployable radar antenna arms 22 with the Tx/Rx modules 34 as described in FIG. 3 as well as a data processing system for receiving and processing bistatic radar signals. Typically the Tx/Rx modules will operate in receive mode only as Rx modules for acquisition of bistatic signals generated from the mothership aircraft radar. However, in certain applications, the UAV radar system 46 will include transmitting capability to supplement the radar transmission from the mothership aircraft 10. A communications data link 48 in the mothership aircraft 10 and a mating communications data link 50 in the UAV 14 are operably connected to provide communications between the mothership aircraft and the UAV. Data from the communications data link 48 to the mission management and pilot vehicle interface system 43 represented by arrow 45 provides bistatic radar information from the UAV radar system 46 and data regarding the UAV position and flight profile from the UAV control system 44 to the mission management and pilot vehicle interface system 43 for display. Radar commands 47 from the mission management and pilot vehicle interface system 43 to the aircraft radar system 40 provide commands to the radar to directionally control the radar beam to the intended target. UAV commands 49 from the mission management and pilot vehicle interface system 43 to the UAV controller 42 provide input through the communications data link 48 to command the UAV to fly/orbit/loiter in a desired flight profile. In the exemplary embodiment, an L-band (1 to 2 GHz) data link for line of sight bidirectional communication is employed. The UAV may remain primarily in a receive only mode. The data link will contain messages which will be used to direct and control the UAV's flight control system 44 as well as the radar system 46, as needed. The UAV will use the data link to report its location and current air vehicle status back to the host mothership aircraft as well as transmission of data from the radar system 46. The communications data links 48, 50 may employ data burst or beam agility capability for covert operation. The communications data links 48, 50 may also employ pre-launch communications elements 52, 54 \"hardwire\" connected through Ethernet or fiber optic ports 56 for pre-launch communication between the mothership aircraft 10 and UAV 14.", "similarity": 0.34873858094215393}], "top_claims": [{"patent_id": "EP3248865", "marker": "8.", "content": "The unmanned aerial vehicle (UAV) (14) as defined in any of claims 1 to 7 wherein the self-destruct system (58) is operable by the UAV flight control system (44) or a UAV controller (42) installed in the mothership aircraft (10).", "similarity": 0.3785102367401123}, {"patent_id": "EP3248865", "marker": "7.", "content": "The unmanned aerial vehicle (UAV) (14) as defined in any of claims 1 to 6 further comprising a self-destruct system (58) in the UAV (14).", "similarity": 0.3523494303226471}, {"patent_id": "EP3248865", "marker": "5.", "content": "The unmanned aerial vehicle (UAV) (14) as defined in any of claims 1 to 4 further comprising deployment rods (36) pivotally connected to the antenna arms (22) to deploy the antenna arms (22).", "similarity": 0.3056187629699707}     const articlesEl = document.getElementById('articles');

    for (const [articleName, chunks] of Object.entries(ARTICLES)) {
      const section = document.createElement('div');

      const title = document.createElement('div');
      title.className = 'article-title';
      const url = ARTICLE_URLS[articleName];
      title.innerHTML = escapeHtml(articleName.replace(/_/g, ' ')) +
        (url ? ' <a class="article-source-link" href="' + url + '" target="_blank" rel="noopener">↗ source</a>' : '');
      section.appendChild(title);

      for (const [idx, chunkName] of chunks) {
        const chunk = DATA[chunkName];
        const div = document.createElement('div');
        div.className = 'chunk';
        div.dataset.chunk = chunkName;
        div.innerHTML = '<div class="chunk-label">Chunk ' + idx + '</div>' + escapeHtml(chunk.chunk_content);
        div.addEventListener('mouseenter', () => showResults(chunkName, div));
        section.appendChild(div);
      }

    }

    function showResults(chunkName, el) {
      if (activeChunk) activeChunk.classList.remove('active');
      el.classList.add('active');
      activeChunk = el;

      const chunk = DATA[chunkName];
      let html = '';

      html += '<div class="section-label">Top 3 Descriptions</div>';
      if (chunk.top_descriptions.length === 0) {
        html += '<p class="no-matches">No description matches</p>';
      } else {
        for (const d of chunk.top_descriptions) {
          html += resultCard(d.marker, d.patent_id, d.content, d.similarity);
        }
      }

      html += '<div class="section-label">Top 3 Claims</div>';
      if (chunk.top_claims.length === 0) {
        html += '<p class="no-matches">No claim matches</p>';
      } else {
        for (const c of chunk.top_claims) {
          html += resultCard(c.marker, c.patent_id, c.content, c.similarity);
        }
      }

      document.getElementById('results').innerHTML = html;
    }

    function resultCard(marker, patentId, content, similarity) {
      const pct = Math.round(similarity * 100);
      const title = PATENT_TITLES[patentId] || '';
      const espacenetUrl = 'https://worldwide.espacenet.com/patent/search?q=pn%3D' + encodeURIComponent(patentId);
      return (
        '<div class="result-card">' +
          '<div class="result-meta">' +
            '<span class="result-marker">' + escapeHtml(String(marker)) + '</span>' +
            '<span class="result-patent">' + escapeHtml(patentId) + '</span>' +
          '</div>' +
          (title ? '<div class="result-title">' + escapeHtml(title) + '</div>' : '') +
          '<a class="result-espacenet" href="' + espacenetUrl + '" target="_blank" rel="noopener">View on Espacenet ↗</a>' +
          '<div class="sim-bar"><div class="sim-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="result-content">' + escapeHtml(content) + '</div>' +
          '<div class="sim-score">Similarity: ' + similarity.toFixed(3) + '</div>' +
        '</div>'
      );
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
